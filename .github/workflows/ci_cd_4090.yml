name: CI/CD job for 4090

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:

  push_to_registry_4090:

    runs-on: RTX 4090
    outputs:
      date_tag: ${{ steps.get-date.outputs.date_tag }}
    steps:
    - uses: actions/checkout@v4

    - name: Put current date into a variable
      run:  $NOW=& Get-Date -format yyyy.MM.dd.hh.ss; echo "NOW=$NOW" >> $env:GITHUB_ENV

    - name: Save tag
      id: get-date
      run: echo "date_tag=${{env.NOW}}" >> $env:GITHUB_OUTPUT

    - name: Log in to Docker Hub
      uses: docker/login-action@v3.0.0
      with:
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_HUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5.1.0
      with:
        context: .
        file: ./Dockerfile
        push: true
        platforms: linux/amd64
        tags: "${{ secrets.DOCKER_USER }}/gamac:${{env.NOW}}"

  run_on_4090:
    needs: push_to_registry_4090
    runs-on: RTX 4090

    steps:
    - uses: actions/checkout@v4

    - name: Check date tag
      run: echo "${{ needs.push_to_registry_4090.outputs.date_tag }}"

    - name: Run docker container
      env:
          date_tag: ${{ needs.push_to_registry_4090.outputs.date_tag }}
      run: >-
          docker run
          --rm
          -i
          --gpus=all
          "${{ secrets.DOCKER_USER }}/gamac:${{ needs.push_to_registry_4090.outputs.date_tag }}"